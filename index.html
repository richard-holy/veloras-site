<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Veloras</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Disable indexing -->
  <meta name="robots" content="noindex, nofollow">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #eaeaea;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
    }
    h1 {
      font-weight: 300;
      letter-spacing: 2px;
    }
    input {
      padding: 10px;
      width: 70%;
      margin-top: 20px;
      background: #111;
      border: 1px solid #333;
      color: #fff;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Veloras</h1>
    <p>A journey to find identity and joy in sound.</p>

    <!-- Replace action with your email service -->
    <form action="https://formspree.io/f/YOUR_ID" method="POST">
      <input type="email" name="email" placeholder="Your email" required>
      <br>
      <button type="submit">Join</button>
    </form>
  </div>
</body>
</html>
