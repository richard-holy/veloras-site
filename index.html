<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background: repeating-linear-gradient(
    to bottom,
    #fafafa,
    #fafafa 2px,

    #ffffff 8px
  );
  font-family:'Roboto', sans-serif;
  padding: 2rem 1rem;
}

.page {
  width: 100%;
  max-width: 900px;
  background: #fffdee;
  padding: 2rem 1.5rem;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  border-radius: 6px;
}

header { width:100%; display:flex; justify-content:center; }
.logo img { width:100%; max-width:800px; height:auto; }

.visually-soft {
  font-size: 0.8rem;
  opacity: 0.8;
  text-align: center;
  margin-top: 0.5rem;
}

.hero {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  max-width:800px;
  margin-bottom:2rem;
  opacity:0;
  animation:fadeIn 2s forwards 1s;
  font-family: "Dancing Script", cursive;
}

.hero p {
  font-size:2rem;
  line-height:1.6;
  padding:1em;
  text-align: center;
}

.subscribe-section {
  display:flex;
  flex-direction:column;
  align-items:center;
  opacity:0;
  animation:fadeIn 2s forwards 3s;
}

.subscribe-text {
  font-size:0.9rem;
  max-width:600px;
  line-height:1.5;
  margin-bottom:0.5rem;
  text-align: center;
}

.subscribe-form {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:0.5rem;
  width:100%;
  max-width:600px;
}

.subscribe-form input {
  min-width:200px;
  padding:0.75rem 1rem;
  border:2px solid lightgray;
  font-size:1rem;
}

.subscribe-form button {
  padding:0.75rem 2rem;
  border:2px solid lightgray;
  background:transparent;
  font-size:1rem;
  cursor:pointer;
  transition:all 0.3s;
}

.subscribe-form button:hover {
  background:#000;
  color:#fff;
}

.separator-vinyl {
  max-width: 650px;
  width: 80%;
  margin: 1rem auto;
  height: 6px;
  background: repeating-linear-gradient(
    to right,
    #000,
    #000 1px,
    transparent 1px,
    transparent 3px
  );
}

#success-msg {
  margin-top: 1em;
  display:none;
  color:darkred;
  font-weight:bold;
  opacity:0;
  transition:opacity 0.6s;
}

.mid-image {
  width: 70%;
  max-width: 560px;
  margin: 2rem auto;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  animation: fadeIn 2s forwards 2s;
}

.mid-image img {
  width: 100%;
  height: auto;
  display: block;
  transition: opacity 0.8s ease-in-out;
}

.socials {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:2rem;
  padding-bottom:2em;
}

.socials a {
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:42px;
  height:42px;
  opacity:0.7;
  transition:opacity 0.3s, transform 0.3s;
}

.socials a:hover {
  opacity:1;
  transform:translateY(-2px);
}

.socials img {
  width:100%;
  height:100%;
  object-fit:contain;
}

.piano-divider img {
  width: 100%;
  height: auto;
  display: block;
}

@keyframes fadeIn {
  to { opacity:1; }
}

#slideshow-image {
  opacity: 1;
}

<body>

<div class="page">

<header>
  <div class="logo">
    <img src="veloras_logo_bw_trans_with_her.png" alt="Veloras Logo">

</header>

<div class="separator-vinyl"></div>

<h1 class="visually-soft">Veloras – Music & Art</h1>

<p class="visually-soft">Multi-genre music project by Veloras.</p>
<p class="visually-soft">Now on Youtube, Spotify, iTunes...</p>

<div class="separator-vinyl"></div>

<section class="hero">

    She moves through time, through light, through sound.<br>
    Between echoes and ink, she exists.
  </p>

    Be first to witness the melodies before they unfold.

    <a href="https://www.facebook.com/people/veloras/61573358875312/"><img src="facebook.svg"></a>
  </div>
</footer>

<div class="piano-divider">
  <img src="piano_roll.png">
</div>

</div>

<script>
const slideShow = [
  { image:"veloras-yt-thumb.png", alt:"Cryptic Calls", link:"https://www.youtube.com/watch?v=G3b_p3u9IKg" },
  { image:"yt-thumb-spell.png", alt:"Spell", link:"https://www.youtube.com/watch?v=MnokXSH3wmU" },
  { image:"yt-thumb-pensnpages.png", alt:"Pens & Pages", link:"https://www.youtube.com/watch?v=BgVhqSwmLl0" },
  { image:"Party-One-Klub-Gumarna.png", alt:"Party ONE", link:"https://www.veloras.art/party-one" },
  { image:"PartyPosterNarozky2.png", alt:"VIP Party", link:"https://www.veloras.art/disco-party-2026" }
];

let currentSlide = 0;

const slideImage = document.getElementById("slideshow-image");
const slideLink = document.getElementById("slideshow-link");

function preloadImages() {
  slideShow.forEach(slide => {
    const img = new Image();
    img.src = "slideshow/" + slide.image;
  });
}

function showSlide(index) {
  const slide = slideShow[index];
  slideImage.src = "slideshow/" + slide.image;
  slideImage.alt = slide.alt;
  slideLink.href = slide.link;
}

function nextSlide() {
  slideImage.style.opacity = 0;

  setTimeout(() => {
    currentSlide = (currentSlide + 1) % slideShow.length;
    showSlide(currentSlide);
    slideImage.style.opacity = 1;
  }, 800);
}

preloadImages();
showSlide(currentSlide);

let slideTimer = setInterval(nextSlide, 5000);

slideImage.addEventListener("mouseenter", () => clearInterval(slideTimer));
slideImage.addEventListener("mouseleave", () => {
  slideTimer = setInterval(nextSlide, 5000);
});
</script>

</body>
