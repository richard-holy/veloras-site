<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veloras Music</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    background:#fff;
    color:#000;
    font-family:'Roboto', sans-serif;
    text-align:center;
    padding:2rem 1rem;
    overflow-x:hidden;
  }
  header { width:100%; display:flex; justify-content:center; margin-bottom:2rem; }
  .logo img { width:100%; max-width:600px; height:auto; opacity:0; animation:fadeIn 1s forwards 0.3s; }

  .hero { display:flex; flex-direction:column; justify-content:center; align-items:center; max-width:800px; margin-bottom:2rem; opacity:0; animation:fadeIn 1s forwards 0.6s; }
  .hero h1 { font-family:'Playfair Display', serif; font-size:3rem; margin-bottom:1rem; }
  .hero p { font-size:1.25rem; line-height:1.6; }

  .subscribe-section { display:flex; flex-direction:column; align-items:center; gap:1rem; opacity:0; animation:fadeIn 1s forwards 1s; }
  .subscribe-text { font-size:1rem; max-width:600px; line-height:1.5; margin-bottom:0.5rem; }

  .subscribe-form {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:0.5rem;
    width:100%;
    max-width:600px;
  }
  .subscribe-form input[type="email"] {
    flex:1 1 auto;
    min-width:200px;
    padding:0.75rem 1rem;
    border:2px solid #000;
    font-size:1rem;
    outline:none;
  }
  .subscribe-form button {
    padding:0.75rem 2rem;
    border:2px solid #000;
    background:transparent;
    font-size:1rem;
    cursor:pointer;
    transition:all 0.3s;
    white-space:nowrap;
  }
  .subscribe-form button:hover { background:#000; color:#fff; }
  .footer {
    padding:2rem 2rem;
  }

  #success-msg { display:none; color:green; font-weight:bold; opacity:0; transition:opacity 0.6s; }

  @keyframes fadeIn {
    to { opacity:1; }
  }

  @media (max-width:600px){
    .hero h1 { font-size:2rem; }
    .hero p { font-size:1rem; }
    .subscribe-text { font-size:0.9rem; }
    .subscribe-form { flex-direction:column; }
    .subscribe-form button { width:100%; }
  }
</style>
</head>
<body>

<!-- Logo Banner -->
<header>
  <div class="logo"><img src="veloras_logo.png" alt="Veloras Logo"></div>
</header>

<!-- Hero Section -->
<section class="hero">
  <p>She moves through time, through light, through sound.<br>Between echoes and ink, she exists.</p>
</section>

<!-- Subscription Section -->
<section class="subscribe-section">
  <p class="subscribe-text">Be first to witness the melodies before they unfold.<br>Subscribe for music, videos, events and more.</p>
  <form id="subscribe-form" class="subscribe-form">
    <input type="email" name="email" placeholder="Your email address" required>
    <button type="submit" class="g-recaptcha" 
            data-sitekey="6LfdbJAsAAAAAFfYGKUgpOJFnItFvVjmJGKMD9ZN" 
            data-callback="onSubmit" 
            data-size="invisible">Subscribe</button>
  </form>
  <p id="success-msg">Thank you for subscribing!</p>
</section>
<p class="footer">
 <a href="mailto:music@veloras.art">music@veloras.art</a>
</p>

<script>
  const form = document.getElementById('subscribe-form');
  const successMsg = document.getElementById('success-msg');
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzf1Qoz4yL6gMAulP9gB6Cuog1Enq7dCV5V2FqDqs4kScaGZYJZydnUM81sdyzmqN5chw/exec'; // Replace with your Apps Script /exec URL

  function onSubmit(token) {
    const email = form.email.value;
    fetch(scriptURL, {
      method: 'POST',
      body: new URLSearchParams({ email, 'g-recaptcha-response': token })
    }).then(res => {
      if(res.ok) {
        successMsg.style.display = 'block';
        successMsg.style.opacity = 1;
        form.reset();
        grecaptcha.reset();
      } else {
        alert('Submission failed. Please try again.');
      }
    }).catch(err => alert('Error: '+err.message));
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    grecaptcha.execute(); // triggers invisible captcha
  });
</script>

</body>
</html>
